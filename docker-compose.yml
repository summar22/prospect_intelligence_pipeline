version: "3.9"

services:
  enrichment-api:
    build: ./mock_enrichment_api
    ports:
      - "8900:8900"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  pipeline:
    build: .
    depends_on:
      enrichment-api:
        condition: service_healthy
    environment:
      - ENRICHMENT_API_URL=http://enrichment-api:8900
    volumes:
      - ./output:/app/output
